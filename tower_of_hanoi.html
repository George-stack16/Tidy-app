<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tower of Hanoi</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-primary: #ffffff;
    --bg-secondary: #f4f3f0;
    --text-primary: #1a1a18;
    --text-secondary: #5f5e5a;
    --border: rgba(0,0,0,0.15);
    --border-hover: rgba(0,0,0,0.3);
    --purple: #7F77DD;
    --radius-md: 8px;
    --radius-lg: 12px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg-primary: #1e1e1c;
      --bg-secondary: #2c2c2a;
      --text-primary: #f0ede6;
      --text-secondary: #b4b2a9;
      --border: rgba(255,255,255,0.15);
      --border-hover: rgba(255,255,255,0.3);
    }
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg-secondary);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 2rem 1rem;
  }

  #app {
    background: var(--bg-primary);
    border-radius: var(--radius-lg);
    border: 0.5px solid var(--border);
    padding: 1.75rem;
    width: 100%;
    max-width: 680px;
  }

  h1 {
    font-size: 18px;
    font-weight: 500;
    margin-bottom: 1.5rem;
  }

  .controls {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 1.25rem;
  }

  label { font-size: 14px; color: var(--text-secondary); }

  input[type=number] {
    width: 64px;
    padding: 6px 10px;
    border-radius: var(--radius-md);
    border: 0.5px solid var(--border-hover);
    background: var(--bg-primary);
    color: var(--text-primary);
    font-size: 14px;
  }

  button {
    padding: 7px 16px;
    border-radius: var(--radius-md);
    border: 0.5px solid var(--border-hover);
    background: var(--bg-primary);
    color: var(--text-primary);
    font-size: 14px;
    cursor: pointer;
    transition: background .15s;
  }

  button:hover { background: var(--bg-secondary); }
  button:disabled { opacity: .4; cursor: default; }

  .speed-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 1.25rem;
  }

  .speed-row input[type=range] { flex: 1; max-width: 200px; }
  .speed-row span { font-size: 13px; color: var(--text-secondary); min-width: 60px; }

  .stats {
    display: flex;
    gap: 12px;
    margin-bottom: 1.25rem;
    flex-wrap: wrap;
  }

  .stat-card {
    background: var(--bg-secondary);
    border-radius: var(--radius-md);
    padding: .75rem 1rem;
    min-width: 110px;
  }

  .stat-card .slabel { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
  .stat-card .sval   { font-size: 20px; font-weight: 500; }

  #progress-bar-wrap {
    height: 4px;
    background: var(--bg-secondary);
    border-radius: 2px;
    margin-bottom: 1rem;
    overflow: hidden;
  }

  #progress-bar {
    height: 4px;
    background: var(--purple);
    border-radius: 2px;
    width: 0%;
    transition: width .2s;
  }

  canvas {
    width: 100%;
    display: block;
    border-radius: var(--radius-md);
    background: var(--bg-secondary);
  }

  #step-info {
    min-height: 24px;
    font-size: 13px;
    color: var(--text-secondary);
    margin-top: .75rem;
    text-align: center;
  }
</style>
</head>
<body>
<div id="app">
  <h1>Tower of Hanoi</h1>

  <div class="controls">
    <label for="disk-input">Disks</label>
    <input type="number" id="disk-input" min="1" max="10" value="3">
    <button id="btn-set">Set</button>
    <button id="btn-solve">Solve</button>
    <button id="btn-step" disabled>Step</button>
    <button id="btn-reset">Reset</button>
  </div>

  <div class="speed-row">
    <label>Speed</label>
    <input type="range" id="speed-slider" min="50" max="1000" value="500" step="50">
    <span id="speed-label">500 ms</span>
  </div>

  <div class="stats">
    <div class="stat-card"><div class="slabel">Disks</div><div class="sval" id="stat-disks">3</div></div>
    <div class="stat-card"><div class="slabel">Total moves</div><div class="sval" id="stat-total">7</div></div>
    <div class="stat-card"><div class="slabel">Move #</div><div class="sval" id="stat-current">0</div></div>
  </div>

  <div id="progress-bar-wrap"><div id="progress-bar"></div></div>
  <canvas id="c" height="280"></canvas>
  <div id="step-info">Press Solve to animate, or Step to go one move at a time.</div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

const PALLET = [
  '#7F77DD','#1D9E75','#D85A30','#D4537E',
  '#378ADD','#BA7517','#639922','#E24B4A',
  '#888780','#534AB7'
];
const DISK_H = 22, PEG_W = 8, BASE_H = 14, PEG_H = 220;

let numDisks = 3;
let pegs     = [[], [], []];
let moves    = [];
let moveIdx  = 0;
let animTimer = null;

/* ── helpers ── */
function initPegs(n) {
  pegs = [Array.from({length: n}, (_, i) => n - i), [], []];
}

function genMoves(n, from, to, via, arr) {
  if (n === 0) return;
  genMoves(n - 1, from, via, to, arr);
  arr.push([from, to]);
  genMoves(n - 1, via, to, from, arr);
}

function applyMove(m) {
  pegs[m[1]].push(pegs[m[0]].pop());
}

/* ── drawing ── */
function drawState() {
  const dpr = window.devicePixelRatio || 1;
  const W   = canvas.parentElement.clientWidth;
  const H   = 280;
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, W, H);

  const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const pegX   = [W / 6, W / 2, 5 * W / 6];
  const baseY  = H - 20;

  /* base platform */
  ctx.fillStyle = isDark ? '#444441' : '#D3D1C7';
  ctx.fillRect(20, baseY, W - 40, BASE_H);

  pegX.forEach((x, i) => {
    /* peg */
    ctx.fillStyle = isDark ? '#888780' : '#5F5E5A';
    ctx.fillRect(x - PEG_W / 2, baseY - PEG_H, PEG_W, PEG_H);

    /* label */
    ctx.fillStyle = isDark ? '#f0ede6' : '#1a1a18';
    ctx.font = '13px -apple-system, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(['A', 'B', 'C'][i], x, baseY + BASE_H + 14);

    /* disks */
    pegs[i].forEach((disk, j) => {
      const maxW = W / 3 - 20;
      const minW = 28;
      const dw   = minW + (maxW - minW) * ((disk - 1) / Math.max(numDisks - 1, 1));
      const dy   = baseY - (j + 1) * DISK_H;
      ctx.beginPath();
      ctx.roundRect(x - dw / 2, dy, dw, DISK_H - 3, 6);
      ctx.fillStyle = PALLET[(disk - 1) % PALLET.length];
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 11px -apple-system, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(disk, x, dy + DISK_H - 3 - 6);
    });
  });
}

/* ── stats ── */
function updateStats() {
  document.getElementById('stat-disks').textContent   = numDisks;
  document.getElementById('stat-total').textContent   = moves.length;
  document.getElementById('stat-current').textContent = moveIdx;
  const pct = moves.length > 0 ? Math.round(moveIdx / moves.length * 100) : 0;
  document.getElementById('progress-bar').style.width = pct + '%';
}

function setInfo(txt) { document.getElementById('step-info').textContent = txt; }

/* ── controls ── */
function stopAnim() {
  if (animTimer) { clearInterval(animTimer); animTimer = null; }
}

function reset() {
  stopAnim();
  initPegs(numDisks);
  moves = []; moveIdx = 0;
  updateStats(); drawState();
  document.getElementById('btn-step').disabled = true;
  setInfo('Press Solve to animate, or Step to go one move at a time.');
}

function prepare() {
  stopAnim();
  initPegs(numDisks);
  moves = [];
  genMoves(numDisks, 0, 2, 1, moves);
  moveIdx = 0;
  updateStats(); drawState();
  document.getElementById('btn-step').disabled = false;
}

function solve() {
  prepare();
  const spd = parseInt(document.getElementById('speed-slider').value);
  document.getElementById('btn-step').disabled = true;
  animTimer = setInterval(() => {
    if (moveIdx >= moves.length) {
      stopAnim();
      setInfo('Done! All disks moved to peg C.');
      return;
    }
    const m = moves[moveIdx];
    setInfo(`Move ${moveIdx + 1}/${moves.length}: disk from peg ${['A','B','C'][m[0]]} → peg ${['A','B','C'][m[1]]}`);
    applyMove(m); moveIdx++;
    updateStats(); drawState();
  }, spd);
}

function stepOnce() {
  if (!moves.length) prepare();
  if (moveIdx >= moves.length) { setInfo('All done! Reset to start again.'); return; }
  const m = moves[moveIdx];
  setInfo(`Move ${moveIdx + 1}/${moves.length}: disk from peg ${['A','B','C'][m[0]]} → peg ${['A','B','C'][m[1]]}`);
  applyMove(m); moveIdx++;
  updateStats(); drawState();
  if (moveIdx >= moves.length) setInfo('All done! Reset to start again.');
}

/* ── event listeners ── */
document.getElementById('btn-set').onclick = () => {
  const v  = parseInt(document.getElementById('disk-input').value) || 3;
  numDisks = Math.min(10, Math.max(1, v));
  document.getElementById('disk-input').value = numDisks;
  reset();
};
document.getElementById('btn-solve').onclick  = solve;
document.getElementById('btn-step').onclick   = stepOnce;
document.getElementById('btn-reset').onclick  = () => {
  numDisks = Math.min(10, Math.max(1, parseInt(document.getElementById('disk-input').value) || 3));
  reset();
};
document.getElementById('speed-slider').oninput = function () {
  document.getElementById('speed-label').textContent = this.value + ' ms';
  if (animTimer) { stopAnim(); solve(); }
};

window.addEventListener('resize', drawState);

/* ── init ── */
initPegs(numDisks);
updateStats();
drawState();
</script>
</body>
</html>
